    <title>Revealr</title>

    <meta
      name="description"
      content="Revealr is a lightweight FAQ accordion web application built with React and TypeScript. It presents a list of frequently asked questions where each item is collapsed by default, showing only the question title. Users can click a toggle button on any question to expand it and reveal the full answer, then click again to collapse it. Only the content the user explicitly requests is shown at any given time, keeping the interface clean and focused."
    />
